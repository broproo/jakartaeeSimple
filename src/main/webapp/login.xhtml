<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Login | Sakai-App</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        
        <link rel="stylesheet" href="https://unpkg.com/primeflex@3.3.1/primeflex.css"/>

        <style>
            body { 
                margin: 0; 
                font-family: var(--font-family); 
                background: radial-gradient(circle at top left, var(--blue-50) 0%, var(--surface-ground) 100%);
                color: var(--text-color);
            }

            /* Matching the Landing Page Fixed Header */
            .sticky-header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background-color: rgba(255, 255, 255, 0.7) !important; 
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                z-index: 1000;
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
                height: 70px;
            }

            .login-container {
                padding-top: 70px;
                min-height: 100vh;
            }

            .login-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(5px);
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-round: 12px;
            }
            
            .no-underline { text-decoration: none !important; }
        </style>
    </h:head>

    <h:body>
        <div class="flex align-items-center justify-content-between px-4 lg:px-6 sticky-header">
            <div class="flex align-items-center">
                <p:link href="landing.xhtml" styleClass="flex align-items-center no-underline">
                    <div class="bg-blue-600 border-round flex align-items-center justify-content-center mr-2 shadow-2" style="width:38px;height:38px">
                        <i class="pi pi-bolt text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold text-900 tracking-tight">SAKAI</span>
                </p:link>
            </div>
            
            <div class="flex align-items-center">
                <p:link href="landing.xhtml" value="Back to Home" styleClass="p-3 font-medium text-blue-600 no-underline hover:underline"/>
            </div>
        </div>

        <div class="login-container flex align-items-center justify-content-center px-4">
            <div class="surface-card p-5 shadow-4 border-round-xl w-full md:w-30rem login-card">
                <div class="text-center mb-5">
                    <h2 class="text-900 text-3xl font-bold mb-2">Welcome Back</h2>
                    <p class="text-600 font-medium">Please enter your details to sign in</p>
                </div>

                <h:form id="loginForm">
                    <p:messages id="msgs" showDetail="false" closable="true">
                        <p:autoUpdate />
                    </p:messages>

                    <div class="flex flex-column gap-2 mb-4">
                        <p:outputLabel for="email" value="Email Address" styleClass="font-bold text-900"/>
                        <p:inputText id="email" value="#{loginBean.email}" 
                                     placeholder="name@company.com" 
                                     styleClass="w-full py-3 px-3 border-round-lg"/>
                    </div>

                    <div class="flex flex-column gap-2 mb-4">
                        <div class="flex justify-content-between align-items-center">
                            <p:outputLabel for="password" value="Password" styleClass="font-bold text-900"/>
                            <p:link value="Forgot Password?" href="#" styleClass="text-sm font-bold text-blue-600 no-underline"/>
                        </div>
                        <p:password id="password" value="#{loginBean.password}" 
                                    toggleMask="true" 
                                    placeholder="Enter your password"
                                    styleClass="w-full py-3 px-3 border-round-lg"/>
                    </div>

                    <div class="flex align-items-center mb-5">
                        <p:selectBooleanCheckbox id="remember" styleClass="mr-2"/>
                        <p:outputLabel for="remember" value="Keep me logged in" styleClass="text-700"/>
                    </div>

                    <p:commandButton value="Sign In" 
                                     action="#{loginBean.login}" 
                                     icon="pi pi-sign-in" 
                                     styleClass="w-full py-3 text-xl font-bold shadow-2 border-round-lg mb-4"/>
                    
                    <div class="text-center">
                        <span class="text-600">Don't have an account? </span>
                        <p:link value="Sign up for free" href="#" styleClass="font-bold text-blue-600 no-underline"/>
                    </div>
                </h:form>
            </div>
        </div>

        <div class="text-center py-4 text-gray-500 text-sm">
            © 2026 Bro-Ecom. All rights reserved.
        </div>
    </h:body>
</html>
